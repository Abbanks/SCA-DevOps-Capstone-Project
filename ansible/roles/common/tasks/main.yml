- name: Ensure Python is installed (Bootstrap)
  ansible.builtin.raw: test -e /usr/bin/python3 || (apt update && apt install -y python3)
  changed_when: false

- name: Configure temporary HTTP sources for bootstrap
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: |
      deb http://archive.ubuntu.com/ubuntu jammy main universe
    mode: '0644'

- name: Install CA certificates and base dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - python3-apt
      - curl
      - sudo
      - cron
    state: present
    update_cache: true

- name: Configure permanent HTTPS production sources
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: |
      deb https://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
      deb https://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
      deb https://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
      deb https://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
    mode: '0644'

- name: Final update of apt cache with retries
  ansible.builtin.apt:
    update_cache: true
  register: common_apt_update
  retries: 5
  delay: 10
  until: common_apt_update is succeeded

- name: Create application user
  ansible.builtin.user:
    name: appuser
    shell: /bin/bash
    create_home: true
    state: present

- name: Create application log directory
  ansible.builtin.file:
    path: /var/log/app
    state: directory
    owner: appuser
    group: appuser
    mode: '0755'

- name: Deploy logrotate config for application logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/app
    content: |
      /var/log/app/*.log {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0640 appuser appuser
          sharedscripts
          postrotate
              pkill -HUP -f app.py || true
          endscript
      }
    mode: '0644'

- name: Schedule daily log rotation via cron
  ansible.builtin.cron:
    name: "Rotate application logs"
    user: root
    hour: "2"
    minute: "0"
    job: "/usr/sbin/logrotate /etc/logrotate.d/app >> /var/log/logrotate.log 2>&1"
    state: present
