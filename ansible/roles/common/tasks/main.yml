- name: Ensure Python is installed
  raw : test -e /usr/bin/python3 || (apt update && apt install -y python3)
  changed_when: false

- name: Install base packages
  apt:
    name:
      - python3
      - python3-apt
      - curl
      - ca-certificates
      - gnupg
      - cron        
      - rsyslog
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Create application user
  user:
    name: appuser
    shell: /bin/bash
    create_home: yes
    state: present

- name: Set up cron job for log rotation
  cron:
    name: "rotate logs daily"
    minute: "0"
    hour: "0"
    job: "/usr/sbin/logrotate /etc/logrotate.conf"

- name: Ensure application directory exists
  file:
    path: /var/www/app
    state: directory
    owner: appuser
    group: appuser
    mode: '0755'

- name: Ensure cron service is started
  service:
    name: cron
    state: started