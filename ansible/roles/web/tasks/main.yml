---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Stop any existing nginx process
  ansible.builtin.shell:
    cmd: nginx -s stop 2>/dev/null; true
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Deploy nginx reverse proxy config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    mode: '0644'

- name: Start nginx
  ansible.builtin.shell:
    cmd: nginx
    executable: /bin/bash
  changed_when: false

- name: Verify nginx is listening on port 80
  ansible.builtin.wait_for:
    port: 80
    timeout: 10
