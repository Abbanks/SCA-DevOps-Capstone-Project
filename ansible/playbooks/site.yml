---
- name: Base infrastructure setup
  hosts: all
  become: true
  gather_facts: false
  serial: 1
  roles:
    - common

- name: Gather facts after Python install
  hosts: all
  become: true
  gather_facts: true

- name: Post-bootstrap validation
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Confirm Python is ready
      ansible.builtin.debug:
        msg: "Python installed, continuing configuration"

- name: Configure db node
  hosts: db
  become: true
  gather_facts: true
  roles:
    - db

- name: Configure app node
  hosts: app
  become: true
  gather_facts: true
  roles:
    - app

- name: Configure web node
  hosts: web
  become: true
  gather_facts: true
  roles:
    - web

- name: Install node_exporter on all nodes
  hosts: all
  become: true
  gather_facts: true
  roles:
    - node_exporter

- name: Configure monitoring node
  hosts: monitoring
  become: true
  gather_facts: true
  roles:
    - node_exporter
    - monitoring
